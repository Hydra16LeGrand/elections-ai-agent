[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app.sql_agent
    --cov-report=term-missing
    --cov-report=html:htmlcov
markers =
    guardrails: Tests des guardrails de sécurité SQL
    router: Tests du routeur d'intention
    security: Tests de sécurité critiques (priorité haute)
    integration: Tests d'intégration
    slow: Tests lents à exécuter séparément
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
