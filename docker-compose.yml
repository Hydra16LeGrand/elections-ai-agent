services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: artefact_user
      POSTGRES_PASSWORD: artefact_password
      POSTGRES_DB: elections_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ingestion/init_db.sh:/docker-entrypoint-initdb.d/01_init_db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artefact_user -d elections_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@artefact.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

  ingestion:
    build: .
    command: ["python", "ingestion/ingest.py"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://artefact_user:artefact_password@db:5432/elections_db
    volumes:
      - ./ingestion:/app/ingestion
      - ./source_files:/app/source_files
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import psycopg2; conn=psycopg2.connect(\"postgresql://artefact_user:artefact_password@db:5432/elections_db\"); cur=conn.cursor(); cur.execute(\"SELECT 1 FROM vw_results_clean LIMIT 1\"); cur.fetchone()'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  ui:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      ingestion:
        condition: service_completed_successfully
    environment:
      AGENT_DB_URL: postgresql://artefact_reader:reader_password@db:5432/elections_db
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
